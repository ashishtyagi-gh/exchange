<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0e2a47"/>
    </linearGradient>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="560" fill="url(#bg)" rx="14"/>
  <rect x="1" y="1" width="858" height="558" fill="none" stroke="#1e3a5f" stroke-width="1.5" rx="13"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="860" height="52" fill="url(#headerGrad)" rx="13"/>
  <rect x="0" y="38" width="860" height="14" fill="#0e2a47"/>
  <text x="430" y="34" text-anchor="middle" font-family="'SF Mono','Cascadia Code','Consolas',monospace" font-size="18" font-weight="bold" fill="#e2e8f0" letter-spacing="1">Exchange Matching Engine — System Architecture</text>
  <circle cx="24" cy="26" r="7" fill="#ff5f57"/>
  <circle cx="44" cy="26" r="7" fill="#febc2e"/>
  <circle cx="64" cy="26" r="7" fill="#28c840"/>

  <!-- ========== CLIENT ========== -->
  <rect x="30" y="80" width="130" height="70" rx="8" fill="#0f2d4a" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="30" y="80" width="130" height="22" rx="8" fill="#06b6d4" opacity="0.25"/>
  <text x="95" y="96" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#06b6d4">CLIENT</text>
  <text x="95" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#dde8f8">PlaceCommand</text>
  <text x="95" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#dde8f8">CancelCommand</text>

  <!-- CLIENT -> SPSC arrow -->
  <line x1="160" y1="115" x2="215" y2="115" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <text x="187" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#b0cce6">push()</text>

  <!-- ========== SPSC QUEUE ========== -->
  <rect x="215" y="80" width="145" height="70" rx="8" fill="#0f2d4a" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="215" y="80" width="145" height="22" rx="8" fill="#a78bfa" opacity="0.2"/>
  <text x="287" y="96" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#a78bfa">SPSC QUEUE</text>
  <text x="287" y="114" text-anchor="middle" font-family="monospace" font-size="10" fill="#dde8f8">lock-free ring buffer</text>
  <text x="287" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#dde8f8">capacity = 4096 slots</text>
  <text x="287" y="142" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8dcf0">head/tail cache-line pad</text>

  <!-- SPSC -> CONSUMER arrow -->
  <line x1="360" y1="115" x2="415" y2="115" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <text x="387" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#b0cce6">try_pop()</text>

  <!-- ========== CONSUMER THREAD ========== -->
  <rect x="415" y="65" width="170" height="100" rx="8" fill="#0f2d4a" stroke="#10b981" stroke-width="1.5"/>
  <rect x="415" y="65" width="170" height="22" rx="8" fill="#10b981" opacity="0.2"/>
  <text x="500" y="81" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981">CONSUMER THREAD</text>
  <text x="500" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#dde8f8">1 thread per market</text>
  <text x="500" y="114" text-anchor="middle" font-family="monospace" font-size="10" fill="#dde8f8">SpinPolicy | BackoffPolicy</text>
  <text x="500" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8dcf0">drain-on-stop guarantee</text>
  <text x="500" y="142" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8dcf0">pinnable via isolcpus</text>

  <!-- CONSUMER -> ORDER BOOK arrow -->
  <line x1="500" y1="165" x2="500" y2="210" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="512" y="193" font-family="monospace" font-size="9" fill="#b0cce6">dispatch()</text>

  <!-- ========== ORDER BOOK ========== -->
  <rect x="340" y="210" width="320" height="190" rx="8" fill="#0a1628" stroke="#f59e0b" stroke-width="2"/>
  <rect x="340" y="210" width="320" height="24" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="500" y="228" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#f59e0b">ORDER BOOK</text>

  <!-- bids_ -->
  <rect x="355" y="243" width="130" height="68" rx="6" fill="#0d2137" stroke="#10b981" stroke-width="1.2"/>
  <text x="420" y="258" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#10b981">bids_</text>
  <text x="420" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">pmr::map desc</text>
  <text x="420" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">Price → PriceLevel</text>
  <text x="420" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8dcf0">std::greater&lt;Price&gt;</text>
  <text x="420" y="304" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">begin() = best bid</text>

  <!-- asks_ -->
  <rect x="515" y="243" width="130" height="68" rx="6" fill="#0d2137" stroke="#ef4444" stroke-width="1.2"/>
  <text x="580" y="258" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#ef4444">asks_</text>
  <text x="580" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">pmr::map asc</text>
  <text x="580" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">Price → PriceLevel</text>
  <text x="580" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8dcf0">std::less&lt;Price&gt;</text>
  <text x="580" y="304" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">begin() = best ask</text>

  <!-- orders_ -->
  <rect x="355" y="320" width="290" height="68" rx="6" fill="#0d2137" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="500" y="336" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#8b5cf6">orders_</text>
  <text x="500" y="350" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">pmr::unordered_map&lt;OrderId, Order&gt;</text>
  <text x="500" y="362" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">lazy deletion: status = Canceled/Filled</text>
  <text x="500" y="376" text-anchor="middle" font-family="monospace" font-size="8" fill="#c8dcf0">O(1) cancel  |  self-trade prevention  |  seq counter</text>

  <!-- ORDER BOOK -> EMIT arrow -->
  <line x1="660" y1="305" x2="710" y2="305" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <text x="685" y="298" text-anchor="middle" font-family="monospace" font-size="9" fill="#b0cce6">events</text>

  <!-- ========== EVENTS OUT ========== -->
  <rect x="710" y="270" width="130" height="100" rx="8" fill="#0f2d4a" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="710" y="270" width="130" height="22" rx="8" fill="#dde8f8" opacity="0.15"/>
  <text x="775" y="286" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#dde8f8">EVENTS OUT</text>
  <text x="775" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981">Fill</text>
  <text x="775" y="320" text-anchor="middle" font-family="monospace" font-size="10" fill="#06b6d4">Ack</text>
  <text x="775" y="335" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444">Reject</text>
  <text x="775" y="350" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">CancelAck</text>
  <text x="775" y="363" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">JSON / queue / null</text>

  <!-- ========== MARKET ARENA ========== -->
  <rect x="30" y="420" width="650" height="108" rx="8" fill="#0a1628" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="30" y="420" width="650" height="22" rx="8" fill="#10b981" opacity="0.15"/>
  <text x="355" y="436" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981">MARKET ARENA (per-market PMR stack)</text>

  <!-- Arena stack boxes -->
  <rect x="50"  y="448" width="90"  height="32" rx="5" fill="#0d2137" stroke="#475569" stroke-width="1"/>
  <text x="95"  y="460" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">buffer_</text>
  <text x="95"  y="472" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">16MB stack</text>

  <text x="148" y="466" text-anchor="middle" font-family="monospace" font-size="13" fill="#b0cce6">&#x2192;</text>

  <rect x="158" y="448" width="110" height="32" rx="5" fill="#0d2137" stroke="#475569" stroke-width="1"/>
  <text x="213" y="460" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">monotonic_</text>
  <text x="213" y="472" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">bump allocator</text>

  <text x="276" y="466" text-anchor="middle" font-family="monospace" font-size="13" fill="#b0cce6">&#x2192;</text>

  <rect x="287" y="448" width="120" height="32" rx="5" fill="#0d2137" stroke="#475569" stroke-width="1"/>
  <text x="347" y="460" text-anchor="middle" font-family="monospace" font-size="9" fill="#dde8f8">TrackingResource</text>
  <text x="347" y="472" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">committed_ watermark</text>

  <text x="415" y="466" text-anchor="middle" font-family="monospace" font-size="13" fill="#b0cce6">&#x2192;</text>

  <rect x="426" y="448" width="110" height="32" rx="5" fill="#0d2137" stroke="#10b981" stroke-width="1.2"/>
  <text x="481" y="460" text-anchor="middle" font-family="monospace" font-size="9" fill="#10b981">pool_</text>
  <text x="481" y="472" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">unsync_pool_resource</text>

  <text x="543" y="466" text-anchor="middle" font-family="monospace" font-size="13" fill="#b0cce6">&#x2192;</text>

  <rect x="554" y="448" width="110" height="32" rx="5" fill="#0d2137" stroke="#a78bfa" stroke-width="1"/>
  <text x="609" y="460" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">containers</text>
  <text x="609" y="472" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">map / deque / hash</text>

  <text x="355" y="512" text-anchor="middle" font-family="monospace" font-size="9" fill="#b0cce6">pool freed memory is recycled  |  should_reject_new_orders() at 70% committed  |  pool_ destroyed first (reverse member order)</text>

  <!-- Arena -> OrderBook connection line -->
  <line x1="500" y1="420" x2="500" y2="400" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- Legend -->
  <rect x="700" y="420" width="140" height="108" rx="6" fill="#0d1b2a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="770" y="437" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#dde8f8">LEGEND</text>
  <line x1="716" y1="450" x2="736" y2="450" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <text x="745" y="454" font-family="monospace" font-size="9" fill="#dde8f8">command flow</text>
  <line x1="716" y1="466" x2="736" y2="466" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="745" y="470" font-family="monospace" font-size="9" fill="#dde8f8">dispatch</text>
  <line x1="716" y1="482" x2="736" y2="482" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <text x="745" y="486" font-family="monospace" font-size="9" fill="#dde8f8">events out</text>
  <line x1="716" y1="498" x2="736" y2="498" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="745" y="502" font-family="monospace" font-size="9" fill="#dde8f8">memory</text>
  <text x="770" y="518" text-anchor="middle" font-family="monospace" font-size="8" fill="#b0cce6">C++23 / std::pmr</text>
</svg>
